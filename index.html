<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenario Log v1.6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        :root {
            --bg: #030712;
            --surface: #111827;
            --text: #f3f4f6;
            --accent-rgb: 34, 197, 94;
            --radius: 8px;
        }
        [x-cloak] { display: none !important; }
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bg-surface { background-color: var(--surface); }
        .text-accent { color: rgb(var(--accent-rgb)); }
        .bg-accent { background-color: rgb(var(--accent-rgb)); }
        .border-accent { border-color: rgb(var(--accent-rgb)); }
        .rounded-theme { border-radius: var(--radius); }

        /* Drag and Drop Visuals */
        .drag-over { 
            border-top: 4px solid rgb(var(--accent-rgb)) !important;
            padding-top: 1.5rem !important;
        }
        .dragging { opacity: 0.3; transform: scale(0.95); }
        .dragging * { pointer-events: none !important; }

        .act-drop-zone {
            height: 40px;
            margin-top: -20px;
            transition: all 0.2s;
        }
        .act-drop-zone.drag-over {
            height: 60px;
            background: rgba(var(--accent-rgb), 0.05);
            border: 2px dashed rgba(var(--accent-rgb), 0.3);
            margin-bottom: 1rem;
            border-radius: var(--radius);
        }

        /* Markdown Styling */
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .markdown-content strong { color: rgb(var(--accent-rgb)); font-weight: bold; }
        .markdown-content em { font-style: italic; opacity: 0.9; }

        /* Navigation Responsive */
        @media (max-width: 768px) {
            .app-container { padding-bottom: 120px; padding-right: 1rem; }
            .nav-container { 
                position: fixed; bottom: 0; left: 0; width: 100%; 
                display: flex; justify-content: space-around; align-items: center; 
                background: var(--surface); border-top: 1px solid rgba(255,255,255,0.1);
                padding: 16px 0 32px 0; z-index: 50;
            }
            .sidebar-desktop { display: none; }
        }
        @media (min-width: 769px) {
            .app-container { padding-right: 100px; }
            .nav-container { display: none; }
            .sidebar-desktop { 
                position: fixed; right: 24px; top: 50%; transform: translateY(-50%); 
                display: flex; flex-direction: column; gap: 12px; z-index: 50;
            }
        }

        .color-preview {
            width: 100%; height: 38px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; padding: 2px; background: #000;
        }
        .color-preview::-webkit-color-swatch { border-radius: 4px; border: none; }
    </style>
</head>
<body>

    <input type="file" id="importFile" accept=".json" class="hidden" onchange="window.handleImport(event)">

    <!-- Datalists for Autocomplete -->
    <datalist id="actDatalist"></datalist>
    <datalist id="locationsDatalist"></datalist>
    <datalist id="factionsDatalist"></datalist>

    <!-- Desktop Sidebar -->
    <nav class="sidebar-desktop">
        <button onclick="window.openEditModal()" title="Neues Ereignis" class="p-4 bg-blue-600 hover:opacity-90 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
        </button>
        <button onclick="window.openFactionModal()" title="Figuren & Fraktionen" class="p-4 bg-orange-600 hover:opacity-90 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
        </button>
        <div class="h-px bg-gray-800 my-2"></div>
        <button onclick="window.openExportModal()" title="Export" class="p-3 bg-gray-700 hover:opacity-90 rounded-full transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
        </button>
        <button onclick="document.getElementById('importModal').classList.remove('opacity-0', 'pointer-events-none')" title="Import" class="p-3 bg-gray-700 hover:opacity-90 rounded-full transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"></path></svg>
        </button>
        <button onclick="window.resetApp()" title="Reset" class="p-3 bg-red-900/50 hover:bg-red-800 rounded-full transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5 text-red-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"></path></svg>
        </button>
    </nav>

    <!-- Mobile Bottom Navigation -->
    <nav class="nav-container">
        <button onclick="window.openEditModal()" class="p-3 bg-blue-600 rounded-full text-white shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
        <button onclick="window.openFactionModal()" class="p-3 bg-orange-600 rounded-full text-white shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg></button>
        <button onclick="window.openExportModal()" class="p-3 bg-gray-700 rounded-full text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12l-4-4m4 4l4-4m-4 4V3"></path></svg></button>
        <button onclick="document.getElementById('importModal').classList.remove('opacity-0', 'pointer-events-none')" class="p-3 bg-gray-700 rounded-full text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V3m0 0l-4 4m4-4l4 4"></path></svg></button>
        <button onclick="window.resetApp()" class="p-3 bg-red-900/50 rounded-full text-red-200"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path></svg></button>
    </nav>

    <div id="app" class="app-container p-4 md:p-8"></div>

    <!-- Modals -->
    <!-- Event Details Modal -->
    <div id="eventModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-accent rounded-theme max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center rounded-t-theme shrink-0">
                <h3 id="modalTitle" class="text-xl font-bold text-accent uppercase tracking-wider"></h3>
                <button onclick="window.closeModal('eventModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6 flex-1">
                <div id="modalFluffContainer" class="hidden">
                    <h4 class="text-gray-500 text-sm uppercase tracking-wider mb-2 border-b border-gray-800 pb-1">Vorlesetext</h4>
                    <div class="bg-black/20 border-l-4 border-blue-500/70 p-4 rounded text-blue-200/90 italic text-sm leading-relaxed markdown-content"><div id="modalFluff"></div></div>
                </div>
                <div><h4 class="text-gray-500 text-sm uppercase tracking-wider mb-2 border-b border-gray-800 pb-1">GM Informationen</h4><div id="modalDesc" class="leading-relaxed text-sm markdown-content"></div></div>
                <div><h4 class="text-gray-500 text-sm uppercase tracking-wider mb-2 border-b border-gray-800 pb-1">Schauplätze</h4><p id="modalLocations" class="opacity-70 text-sm"></p></div>
                <div><h4 class="text-gray-500 text-sm uppercase tracking-wider mb-2 border-b border-gray-800 pb-1">Figuren</h4><ul id="modalFigures" class="text-sm space-y-2"></ul></div>
                <div><h4 class="text-gray-500 text-sm uppercase tracking-wider mb-2 border-b border-gray-800 pb-1">SL Notizen</h4><textarea id="modalNotes" class="w-full bg-black/20 border border-gray-700 rounded-theme p-3 focus:border-accent outline-none min-h-[150px] resize-y" placeholder="Notizen..."></textarea></div>
            </div>
        </div>
    </div>

    <!-- Design & Theme Modal -->
    <div id="headerModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-accent rounded-theme max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
                <h3 class="text-xl font-bold text-accent uppercase tracking-wider font-heading">Theme Designer</h3>
                <button onclick="window.closeModal('headerModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 space-y-6 flex-1 overflow-y-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block text-gray-400 uppercase text-[10px] mb-1 font-bold">Terminal Titel</label><input type="text" id="editAppTitle" class="w-full bg-black/20 border border-gray-700 rounded-theme p-2 focus:border-accent outline-none"></div>
                    <div><label class="block text-gray-400 uppercase text-[10px] mb-1 font-bold">Untertitel</label><input type="text" id="editAppSubtitle" class="w-full bg-black/20 border border-gray-700 rounded-theme p-2 focus:border-accent outline-none"></div>
                </div>

                <div class="h-px bg-gray-800"></div>

                <div>
                    <label class="block text-gray-400 uppercase text-[10px] mb-3 font-bold">Theme Presets</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <button onclick="window.applyThemePreset('classic')" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded text-xs border border-gray-600">Classic Terminal</button>
                        <button onclick="window.applyThemePreset('light')" class="px-3 py-2 bg-white text-gray-900 hover:bg-gray-100 rounded text-xs font-bold">Apollo Light</button>
                        <button onclick="window.applyThemePreset('deepsea')" class="px-3 py-2 bg-blue-900 text-blue-100 hover:bg-blue-800 rounded text-xs">Deep Sea</button>
                        <button onclick="window.applyThemePreset('hazard')" class="px-3 py-2 bg-yellow-600 text-black hover:bg-yellow-500 rounded text-xs font-bold">Hazard Zone</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase">Hintergrund</label><input type="color" id="themeColorBg" oninput="window.updateCustomTheme()" class="color-preview"></div>
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase">Oberfläche</label><input type="color" id="themeColorSurface" oninput="window.updateCustomTheme()" class="color-preview"></div>
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase">Schrift</label><input type="color" id="themeColorText" oninput="window.updateCustomTheme()" class="color-preview"></div>
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase">Akzent</label><input type="color" id="themeColorAccent" oninput="window.updateCustomTheme()" class="color-preview"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase font-bold tracking-widest">Radius: <span id="radiusLabel">8px</span></label><input type="range" id="themeRadius" min="0" max="24" step="2" oninput="window.updateCustomTheme()" class="w-full accent-blue-600"></div>
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase font-bold">Überschrift</label><select id="editAppFontHeading" class="w-full bg-black/20 border border-gray-700 rounded p-2 text-sm outline-none"><option value="Orbitron">Orbitron</option><option value="Space Mono">Space Mono</option><option value="Rajdhani">Rajdhani</option><option value="Inter">Inter</option></select></div>
                    <div><label class="block text-gray-400 text-[10px] mb-1 uppercase font-bold">Textkörper</label><select id="editAppFontBody" class="w-full bg-black/20 border border-gray-700 rounded p-2 text-sm outline-none"><option value="Inter">Inter</option><option value="Space Mono">Space Mono</option><option value="Roboto">Roboto</option></select></div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-800 bg-black/20 flex justify-end gap-3 shrink-0">
                <button onclick="window.closeModal('headerModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded text-sm">Abbrechen</button>
                <button onclick="window.saveHeader()" class="px-6 py-2 bg-accent hover:opacity-90 rounded-theme font-bold text-white transition-opacity">Design Speichern</button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-gray-500/50 rounded-theme max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
                <h3 class="text-xl font-bold text-gray-300 uppercase tracking-wider">Export</h3>
                <button onclick="window.closeModal('exportModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 flex-1 flex flex-col gap-4">
                <textarea id="exportTextarea" readonly class="w-full h-32 bg-black/20 border border-gray-700 rounded p-3 text-xs text-accent/80 font-mono outline-none resize-none"></textarea>
                <div id="copySuccessMsg" class="text-accent text-sm font-bold opacity-0 transition-opacity text-center">Kopiert!</div>
            </div>
            <div class="p-4 border-t border-gray-800 flex flex-wrap justify-end gap-2">
                <button onclick="window.closeModal('exportModal')" class="px-4 py-2 bg-gray-800 text-gray-300 text-xs rounded">Schließen</button>
                <button onclick="window.generateAndCopyShareLink()" class="px-4 py-2 bg-purple-600 rounded text-white text-xs">Link</button>
                <button onclick="window.copySeedToClipboard()" class="px-4 py-2 bg-purple-900/40 text-purple-300 text-xs rounded">Seed</button>
                <button onclick="window.copyExportToClipboard()" class="px-4 py-2 bg-gray-700 text-white text-xs rounded">JSON</button>
                <button onclick="window.triggerDownloadFile()" class="px-4 py-2 bg-accent rounded text-white text-xs">Download</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-blue-500/50 rounded-theme max-w-xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
                <h3 class="text-xl font-bold text-gray-300 uppercase tracking-wider">Import</h3>
                <button onclick="window.closeModal('importModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 space-y-6 flex-1 overflow-y-auto">
                <button onclick="document.getElementById('importFile').click()" class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded text-gray-200">JSON Datei auswählen</button>
                <div class="flex gap-2">
                    <input type="text" id="importUrlInput" class="flex-1 bg-black/20 border border-gray-700 rounded p-2 text-sm" placeholder="URL...">
                    <button onclick="window.importFromUrl()" class="px-4 bg-blue-900/40 rounded text-blue-400 font-bold text-xs uppercase">Laden</button>
                </div>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" id="importSeedInput" class="flex-1 bg-black/20 border border-gray-700 rounded p-2 text-xs text-purple-400" placeholder="Seed...">
                        <button onclick="window.importFromSeedText()" class="px-4 bg-purple-900/40 rounded text-purple-300 font-bold text-xs uppercase">OK</button>
                    </div>
                    <textarea id="importJsonInput" class="w-full h-24 bg-black/20 border border-gray-700 rounded p-2 text-xs text-green-500/70 font-mono" placeholder='JSON Text...'></textarea>
                    <button onclick="window.importFromJsonText()" class="w-full py-2 bg-gray-800 rounded text-gray-300 font-bold text-xs">JSON laden</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-blue-500/50 rounded-theme max-w-3xl w-full mx-4 shadow-2xl flex flex-col max-h-[95vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
                <h3 class="text-xl font-bold text-blue-400 uppercase tracking-wider">Bearbeiten</h3>
                <button onclick="window.closeModal('editModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-5 flex-1 text-sm">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase font-bold">Akt</label><input type="text" id="editAct" list="actDatalist" class="w-full bg-black/20 border border-gray-700 rounded p-2 outline-none"></div>
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase font-bold">Titel</label><input type="text" id="editTitle" class="w-full bg-black/20 border border-gray-700 rounded p-2 outline-none"></div>
                </div>
                <div class="flex items-center gap-3"><input type="checkbox" id="editTypeCheckbox" class="w-5 h-5 rounded bg-black/20 border-gray-700 text-blue-600"><span class="text-gray-400 font-bold uppercase text-xs">Notwendig</span></div>
                <div><label class="block text-gray-400 text-xs mb-2 uppercase">Symbol</label><div id="iconSelectionContainer" class="flex flex-wrap gap-2"></div><input type="hidden" id="editIcon"></div>
                <div><label class="block text-blue-400/80 text-xs mb-1 uppercase">Vorlesetext (MD)</label><textarea id="editFluff" class="w-full bg-black/20 border border-gray-700 rounded p-2 text-blue-200 italic min-h-[100px]"></textarea></div>
                <div><label class="block text-gray-400 text-xs mb-1 uppercase">GM Info (MD)</label><textarea id="editDesc" class="w-full bg-black/20 border border-gray-700 rounded p-2 min-h-[150px]"></textarea></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase">Schauplätze</label><div class="flex gap-2 mb-2"><input type="text" id="tagInputLocations" list="locationsDatalist" class="flex-1 bg-black/20 border border-gray-700 rounded p-2"><button onclick="window.addTag('Locations')" class="px-3 bg-gray-800 rounded">+</button></div><div id="tagListLocations" class="flex flex-wrap gap-2"></div></div>
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase">Figuren</label><div class="flex gap-2 mb-2"><input type="text" id="tagInputFigures" list="factionsDatalist" class="flex-1 bg-black/20 border border-gray-700 rounded p-2"><button onclick="window.addTag('Figures')" class="px-3 bg-gray-800 rounded">+</button></div><div id="tagListFigures" class="flex flex-wrap gap-2"></div></div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-800 flex justify-between items-center">
                <button id="btnDeleteEvent" onclick="window.confirmDeleteEvent()" class="px-4 py-2 bg-red-900/30 text-red-400 rounded hover:bg-red-800/60 transition-colors">Löschen</button>
                <div class="flex gap-3"><button onclick="window.closeModal('editModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded">Abbrechen</button><button onclick="window.saveEvent()" class="px-6 py-2 bg-blue-600 font-bold text-white rounded">Speichern</button></div>
            </div>
        </div>
    </div>

    <div id="factionModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-orange-500/50 rounded-theme max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
                <h3 class="text-xl font-bold text-orange-400 uppercase tracking-wider">Figuren</h3>
                <button onclick="window.closeModal('factionModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1"><div id="factionList" class="space-y-2"></div><button onclick="window.addFactionRow()" class="mt-5 px-4 py-2 bg-gray-800 border border-gray-600 text-sm rounded">+ Neue Figur</button></div>
            <div class="p-4 border-t border-gray-800 flex justify-end gap-3"><button onclick="window.closeModal('factionModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded">Abbrechen</button><button onclick="window.saveFactions()" class="px-6 py-2 bg-orange-600 rounded font-bold text-white">Speichern</button></div>
        </div>
    </div>

    <div id="dialogModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-gray-600 rounded-theme max-w-sm w-full mx-4 p-6 text-center shadow-2xl">
            <p id="dialogMessage" class="mb-6"></p>
            <div class="flex justify-center gap-3" id="dialogButtons"></div>
        </div>
    </div>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        // --- THEME PRESETS ---
        const THEMES = {
            classic: { bg: "#030712", surface: "#111827", text: "#f3f4f6", accent: "#22c55e", radius: "8" },
            light: { bg: "#ffffff", surface: "#f9fafb", text: "#111827", accent: "#2563eb", radius: "12" },
            deepsea: { bg: "#020617", surface: "#0f172a", text: "#e2e8f0", accent: "#38bdf8", radius: "20" },
            hazard: { bg: "#1c1917", surface: "#292524", text: "#fde047", accent: "#ea580c", radius: "0" }
        };

        // --- STATE ---
        let appTitle = "Scenario Log";
        let appSubtitle = "INCIDENT PROTOCOL // SYSTEM ONLINE";
        let appFontHeading = "Orbitron"; 
        let appFontBody = "Inter";
        let themeSettings = { ...THEMES.classic };
        let expandedId = null;
        let checkedIds = new Set();
        let collapsedActs = new Set();
        let factions = {};
        let events = [];
        let eventNotes = {};
        let actData = {};
        let draggedEventId = null;
        let currentEditingTags = { Locations: [], Figures: [] };
        let clickTimers = {};
        let currentOpenEventId = null;

        // --- THEME ENGINE ---
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function applyFontsAndTheme(h, b, theme) {
            themeSettings = theme;
            document.querySelectorAll('.dynamic-styles').forEach(e => e.remove());
            const link = document.createElement('link'); link.rel = 'stylesheet'; link.className = 'dynamic-styles'; link.href = `https://fonts.googleapis.com/css2?family=${h.replace(/ /g,'+')}:wght@400;700&family=${b.replace(/ /g,'+')}:wght@400;700&display=swap`; document.head.appendChild(link);
            const style = document.createElement('style'); style.className = 'dynamic-styles';
            const rgb = hexToRgb(theme.accent);
            style.textContent = `
                :root { 
                    --bg: ${theme.bg}; 
                    --surface: ${theme.surface}; 
                    --text: ${theme.text}; 
                    --accent-rgb: ${rgb}; 
                    --radius: ${theme.radius}px; 
                }
                body { font-family: "${b}", sans-serif !important; }
                h1,h2,h3,h4,.font-heading { font-family: "${h}", sans-serif !important; }
            `;
            document.head.appendChild(style);
        }

        window.applyThemePreset = (p) => {
            const t = THEMES[p];
            document.getElementById('themeColorBg').value = t.bg;
            document.getElementById('themeColorSurface').value = t.surface;
            document.getElementById('themeColorText').value = t.text;
            document.getElementById('themeColorAccent').value = t.accent;
            document.getElementById('themeRadius').value = t.radius;
            window.updateCustomTheme();
        };

        window.updateCustomTheme = () => {
            const t = {
                bg: document.getElementById('themeColorBg').value,
                surface: document.getElementById('themeColorSurface').value,
                text: document.getElementById('themeColorText').value,
                accent: document.getElementById('themeColorAccent').value,
                radius: document.getElementById('themeRadius').value
            };
            document.getElementById('radiusLabel').textContent = t.radius + "px";
            applyFontsAndTheme(appFontHeading, appFontBody, t);
        };

        // --- I/O SYSTEMS ---
        function encodeScenario(str) { return btoa(unescape(encodeURIComponent(str))); }
        function decodeScenario(b64) { try { return decodeURIComponent(escape(atob(b64))); } catch(e) { return null; } }
        function getExportData() { return JSON.stringify({ appTitle, appSubtitle, appFontHeading, appFontBody, themeSettings, factions, events, actData, eventNotes, checkedIds: Array.from(checkedIds), collapsedActs: Array.from(collapsedActs) }, null, 2); }

        function applyImportedData(data) {
            if(!data) return;
            appTitle = data.appTitle || "Scenario Log";
            appSubtitle = data.appSubtitle || "";
            appFontHeading = data.appFontHeading || "Orbitron";
            appFontBody = data.appFontBody || "Inter";
            themeSettings = data.themeSettings || { ...THEMES.classic };
            if (data.appColor && !data.themeSettings) themeSettings.accent = (data.appColor.startsWith('#') ? data.appColor : "#22c55e");
            factions = data.factions || {};
            actData = data.actData || {};
            eventNotes = data.eventNotes || {};
            checkedIds = new Set(data.checkedIds || []);
            collapsedActs = new Set(data.collapsedActs || []);
            events = (data.events || []).map(ev => ({ ...ev }));
            applyFontsAndTheme(appFontHeading, appFontBody, themeSettings);
            renderApp();
        }

        // --- RENDER ---
        const icons = {
            AlertCircle: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4M12 16h.01" stroke-width="2"></path></svg>`,
            ShieldAlert: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM12 8v4M12 16h.01" stroke-width="2"></path></svg>`,
            Rocket: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" stroke-width="2"></path></svg>`,
            CheckSquare: `<svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-width="2"></path></svg>`,
            Square: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2" stroke-width="2"></rect></svg>`,
            ChevronDown: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6" stroke-width="2"></path></svg>`,
            ChevronUp: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6" stroke-width="2"></path></svg>`,
            ChevronRight: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" stroke-width="2"></path></svg>`,
            Pencil: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke-width="2"></path></svg>`,
            Skull: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h.01M15 12h.01M8 20v2h8v-2M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20" stroke-width="2"></path></svg>`,
            Radio: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5M12 12m-2 0a2 2 0 1 0 4 0 2 2 0 1 0-4 0M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5M19.1 4.9C23 8.8 23 15.1 19.1 19" stroke-width="2"></path></svg>`,
            Crosshair: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"></circle><path d="M22 12h-4M6 12H2M12 6V2M12 22v-4" stroke-width="2"></path></svg>`,
            DragVertical: `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>`
        };

        function getFactionPalette(figureName) {
            const faction = factions[figureName];
            if (!faction) return { bg: "rgba(100,100,100,0.1)", text: "gray-400", border: "rgba(100,100,100,0.3)" };
            const palettes = [
                {bg:"rgba(239,68,68,0.1)", text:"text-red-400", b:"rgba(239,68,68,0.3)"},
                {bg:"rgba(59,130,246,0.1)", text:"text-blue-400", b:"rgba(59,130,246,0.3)"},
                {bg:"rgba(245,158,11,0.1)", text:"text-orange-400", b:"rgba(245,158,11,0.3)"},
                {bg:"rgba(168,85,247,0.1)", text:"text-purple-400", b:"rgba(168,85,247,0.3)"},
                {bg:"rgba(6,182,212,0.1)", text:"text-cyan-400", b:"rgba(6,182,212,0.3)"}
            ];
            let hash = 0; for (let i = 0; i < faction.length; i++) hash = faction.charCodeAt(i) + ((hash << 5) - hash);
            return palettes[Math.abs(hash) % palettes.length];
        }

        function renderApp() {
            const app = document.getElementById('app');
            const grouped = events.reduce((acc, e) => { if (!acc[e.act]) acc[e.act] = []; acc[e.act].push(e); return acc; }, {});
            
            // Update Datalists
            document.getElementById('actDatalist').innerHTML = Object.keys(grouped).map(a => `<option value="${a}">`).join('');
            document.getElementById('factionsDatalist').innerHTML = Object.keys(factions).map(f => `<option value="${f}">`).join('');
            document.getElementById('locationsDatalist').innerHTML = [...new Set(events.flatMap(e => e.locations || []))].map(l => `<option value="${l}">`).join('');

            let html = `<div class="max-w-4xl mx-auto"><header class="mb-12 border-b border-gray-800 pb-6"><div class="text-left"><h1 onclick="window.openHeaderModal()" class="text-3xl md:text-5xl font-bold text-accent mb-2 uppercase cursor-pointer font-heading tracking-tighter">${appTitle}</h1><p onclick="window.openHeaderModal()" class="opacity-60 text-[10px] md:text-xs cursor-pointer uppercase tracking-[0.2em] font-bold">${appSubtitle}</p></div></header><div class="space-y-12">`;

            if (Object.keys(grouped).length === 0) html += `<div class="text-center py-20 border-2 border-dashed border-gray-800 rounded-theme opacity-50">Keine Daten vorhanden.</div>`;

            for (const [actName, actEvents] of Object.entries(grouped)) {
                const isC = collapsedActs.has(actName);
                html += `<div ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, null, '${actName}')"><div onclick="window.toggleAct('${actName}')" class="sticky top-0 z-10 py-4 mb-6 cursor-pointer flex items-center gap-3 no-select" style="background-color: var(--bg)"><div class="opacity-40">${isC ? icons.ChevronRight : icons.ChevronDown}</div><h2 class="text-xl md:text-2xl font-bold uppercase border-l-4 border-accent pl-4 text-accent font-heading">${actName}</h2></div><div class="border-l-2 border-gray-800 ml-4 md:ml-8 space-y-6 ${isC ? 'hidden' : ''}">`;

                actEvents.forEach(e => {
                    const isO = e.type === 'Optional';
                    const locs = (e.locations || []).join(', ');
                    const figs = (e.figures || []);
                    html += `<div class="relative pl-8 md:pl-12 group" data-drag-id="${e.id}" draggable="true" ondragstart="window.handleDragStart(event, ${e.id})" ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, ${e.id}, '${actName}')" ondragend="window.handleDragEnd(event)"><div class="absolute left-0 top-6 opacity-20 md:group-hover:opacity-100 transition-opacity cursor-grab">${icons.DragVertical}</div><div class="absolute -left-[17px] top-4 w-8 h-8 rounded-full border-2 flex items-center justify-center bg-surface ${isO ? 'border-dashed opacity-40' : 'border-accent text-accent'}">${icons[e.icon] || icons.Rocket}</div><button onclick="window.handleInteraction(event, ${e.id})" class="w-full text-left p-4 rounded-theme border border-gray-800 transition-all hover:border-accent/40 no-select bg-surface/40"><div class="flex justify-between gap-4"><div class="flex items-start gap-3"><div onclick="window.toggleCheckbox(event, ${e.id})" class="mt-1 opacity-50 hover:text-accent hover:opacity-100">${checkedIds.has(e.id) ? icons.CheckSquare : icons.Square}</div><div><h3 class="text-base md:text-lg font-bold font-heading ${checkedIds.has(e.id) ? 'line-through opacity-40' : ''}">${e.title}</h3><div class="flex items-center gap-3 mt-1 flex-wrap"><span class="text-[9px] px-1.5 py-0.5 rounded-theme uppercase font-bold bg-accent/10 text-accent ${isO?'opacity-40':''}">${e.type}</span>${locs ? `<span class="text-[9px] opacity-40 italic">📍 ${locs}</span>` : ''}</div></div></div><div class="flex items-center gap-2"><div onclick="window.openEditModal(${e.id}); event.stopPropagation();" class="opacity-20 hover:text-blue-400 hover:opacity-100 p-1">${icons.Pencil}</div><div class="opacity-30">${expandedId === e.id ? icons.ChevronUp : icons.ChevronDown}</div></div></div><div class="${expandedId === e.id ? 'mt-4 max-h-[1500px]' : 'max-h-0'} overflow-hidden transition-all duration-300"><div class="border-t border-gray-800 pt-4 text-sm opacity-80 markdown-content">${marked.parse(e.description || "")}</div>${figs.length > 0 ? `<div class="flex flex-wrap gap-2 mt-4">${figs.map(f => {
                        const p = getFactionPalette(f);
                        return `<span class="text-[10px] px-2 py-0.5 rounded-theme border ${p.text} font-bold" style="background:${p.bg}; border-color:${p.b}">👤 ${f}</span>`;
                    }).join('')}</div>` : ''}</div></button></div>`;
                });
                html += `<div class="act-drop-zone" ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, null, '${actName}')"></div></div></div>`;
            }
            app.innerHTML = html + `</div>`;
        }

        // --- HANDLER ---
        window.closeModal = (id) => { document.getElementById(id).classList.add('opacity-0', 'pointer-events-none'); };
        window.toggleAct = (a) => { collapsedActs.has(a) ? collapsedActs.delete(a) : collapsedActs.add(a); renderApp(); };
        window.toggleCheckbox = (ev, id) => { ev.stopPropagation(); checkedIds.has(id) ? checkedIds.delete(id) : checkedIds.add(id); renderApp(); };
        window.handleInteraction = (ev, id) => { const t = Date.now(); if(t - (clickTimers[id] || 0) < 300) { clearTimeout(clickTimers['t'+id]); window.openEventModal(id); } else { clickTimers[id] = t; clickTimers['t'+id] = setTimeout(() => { expandedId = expandedId === id ? null : id; renderApp(); }, 300); } };
        window.openEventModal = (id) => { const e = events.find(ev => ev.id === id); if(!e) return; currentOpenEventId = id; document.getElementById('modalTitle').textContent = e.title; document.getElementById('modalDesc').innerHTML = marked.parse(e.description || ""); document.getElementById('modalFluffContainer').className = e.fluff ? "" : "hidden"; document.getElementById('modalFluff').innerHTML = e.fluff ? marked.parse(e.fluff) : ""; document.getElementById('modalLocations').textContent = (e.locations || []).join(', ') || "N/A"; document.getElementById('modalNotes').value = eventNotes[id] || ""; const fl = document.getElementById('modalFigures'); fl.innerHTML = ""; (e.figures || []).forEach(f => {
            const p = getFactionPalette(f);
            fl.insertAdjacentHTML('beforeend', `<li class="flex justify-between items-center border-b border-gray-800 text-xs py-2"><span class="px-2 py-0.5 rounded-theme border ${p.text} font-bold" style="background:${p.bg}; border-color:${p.b}">${f}</span><span class="opacity-40 font-mono text-[10px] uppercase">${factions[f]||"Divers"}</span></li>`);
        }); document.getElementById('eventModal').classList.remove('opacity-0', 'pointer-events-none'); };
        
        window.openEditModal = (id=null) => { 
            const uniqueActs = [...new Set(events.map(ev => ev.act))];
            const defaultAct = uniqueActs.length > 0 ? uniqueActs[0] : "";
            
            const e = events.find(ev => ev.id === id) || { 
                act: defaultAct, title: "", type: "Notwendig", icon: "Rocket", 
                description: "", locations: [], figures: [] 
            }; 

            document.getElementById('editId').value = id || ""; 
            document.getElementById('editAct').value = e.act; 
            document.getElementById('editTitle').value = e.title; 
            document.getElementById('editTypeCheckbox').checked = e.type === "Notwendig"; 
            document.getElementById('editDesc').value = e.description || ""; 
            document.getElementById('editFluff').value = e.fluff || ""; 
            document.getElementById('editIcon').value = e.icon || "Rocket"; 
            currentEditingTags = { Locations: [...(e.locations || [])], Figures: [...(e.figures || [])] }; 
            window.renderEditTags('Locations'); window.renderEditTags('Figures'); 
            window.renderIconSelection(e.icon || "Rocket"); 
            document.getElementById('btnDeleteEvent').style.display = id ? "block" : "none"; 
            document.getElementById('editModal').classList.remove('opacity-0', 'pointer-events-none'); 
        };

        window.saveEvent = () => { const id = parseInt(document.getElementById('editId').value) || Date.now(); const data = { id, act: document.getElementById('editAct').value, title: document.getElementById('editTitle').value, type: document.getElementById('editTypeCheckbox').checked ? "Notwendig" : "Optional", icon: document.getElementById('editIcon').value, fluff: document.getElementById('editFluff').value, description: document.getElementById('editDesc').value, locations: currentEditingTags.Locations, figures: currentEditingTags.Figures }; const idx = events.findIndex(e => e.id === id); if(idx > -1) events[idx] = data; else events.push(data); window.closeModal('editModal'); renderApp(); };
        window.saveHeader = () => { appTitle = document.getElementById('editAppTitle').value; appSubtitle = document.getElementById('editAppSubtitle').value; appFontHeading = document.getElementById('editAppFontHeading').value; appFontBody = document.getElementById('editAppFontBody').value; window.updateCustomTheme(); window.closeModal('headerModal'); renderApp(); };
        window.openHeaderModal = () => { 
            document.getElementById('editAppTitle').value = appTitle; document.getElementById('editAppSubtitle').value = appSubtitle; 
            document.getElementById('themeColorBg').value = themeSettings.bg; document.getElementById('themeColorSurface').value = themeSettings.surface; 
            document.getElementById('themeColorText').value = themeSettings.text; document.getElementById('themeColorAccent').value = themeSettings.accent; 
            document.getElementById('themeRadius').value = themeSettings.radius; document.getElementById('radiusLabel').textContent = themeSettings.radius + "px";
            document.getElementById('headerModal').classList.remove('opacity-0', 'pointer-events-none'); 
        };

        window.handleDragStart = (e, id) => { draggedEventId = id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
        window.handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; const t = e.target.closest('[data-drag-id], .act-drop-zone'); if (t) t.classList.add('drag-over'); };
        window.handleDragLeave = (e) => { const t = e.target.closest('[data-drag-id], .act-drop-zone'); if (t) t.classList.remove('drag-over'); };
        window.handleDrop = (e, targetId, targetAct) => { e.preventDefault(); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); if (draggedEventId === null) return; const draggedIdx = events.findIndex(ev => ev.id === draggedEventId); const targetIdx = targetId ? events.findIndex(ev => ev.id === targetId) : -1; if (draggedIdx === -1) return; const [item] = events.splice(draggedIdx, 1); if (targetAct) item.act = targetAct; if (targetIdx !== -1) { const newIdx = events.findIndex(ev => ev.id === targetId); events.splice(newIdx, 0, item); } else { events.push(item); } draggedEventId = null; renderApp(); };
        window.handleDragEnd = (e) => { e.target.classList.remove('dragging'); };
        window.openExportModal = () => { document.getElementById('exportTextarea').value = getExportData(); document.getElementById('exportModal').classList.remove('opacity-0', 'pointer-events-none'); };
        window.copyExportToClipboard = () => { const tx = document.getElementById('exportTextarea'); tx.select(); document.execCommand('copy'); showCopySuccess("In Zwischenablage kopiert!"); };
        window.copySeedToClipboard = () => { copyToClipboard(encodeScenario(getExportData())); showCopySuccess("Seed kopiert!"); };
        window.generateAndCopyShareLink = () => { copyToClipboard(window.location.origin + window.location.pathname + '?scenario=' + encodeScenario(getExportData())); showCopySuccess("Link kopiert!"); };
        window.importFromSeedText = () => { const dec = decodeScenario(document.getElementById('importSeedInput').value.trim()); if(dec) { applyImportedData(JSON.parse(dec)); window.closeModal('importModal'); } };
        window.importFromJsonText = () => { try { applyImportedData(JSON.parse(document.getElementById('importJsonInput').value)); window.closeModal('importModal'); } catch(e){} };
        window.handleImport = (e) => { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = (ev) => { try { applyImportedData(JSON.parse(ev.target.result)); window.closeModal('importModal'); } catch(ex){} }; r.readAsText(f); } };
        window.addTag = (t) => { const i = document.getElementById(`tagInput${t}`); const v = i.value.trim(); if(v && !currentEditingTags[t].includes(v)){ currentEditingTags[t].push(v); i.value=""; window.renderEditTags(t); } };
        window.removeTag = (t, idx) => { currentEditingTags[t].splice(idx,1); window.renderEditTags(t); };
        window.renderEditTags = (t) => { document.getElementById(`tagList${t}`).innerHTML = currentEditingTags[t].map((tag, i) => `<span class="bg-blue-900/40 border border-blue-700/50 text-blue-300 px-2 py-1 rounded text-[10px] flex items-center gap-2">${tag}<button onclick="window.removeTag('${t}', ${i})" class="hover:text-red-400 font-bold">×</button></span>`).join(''); };
        window.renderIconSelection = (s) => { const c = document.getElementById('iconSelectionContainer'); c.innerHTML = ["Rocket", "Radio", "AlertCircle", "ShieldAlert", "Skull", "Crosshair"].map(i => `<button onclick="window.selectIcon('${i}')" class="p-2 border rounded transition-all ${s===i?'border-accent opacity-100':'opacity-30 border-gray-700'}">${icons[i]}</button>`).join(''); };
        window.selectIcon = (i) => { document.getElementById('editIcon').value = i; window.renderIconSelection(i); };
        window.openFactionModal = () => { const l = document.getElementById('factionList'); l.innerHTML = ""; Object.entries(factions).forEach(([n, f]) => l.insertAdjacentHTML('beforeend', window.createFactionRow(n, f))); document.getElementById('factionModal').classList.remove('opacity-0', 'pointer-events-none'); };
        window.createFactionRow = (n='', f='') => `<div class="faction-row grid grid-cols-12 gap-2 mb-2"><input type="text" placeholder="Name" class="faction-name col-span-5 bg-black/20 border border-gray-700 rounded p-1 text-xs outline-none" value="${n}"><input type="text" placeholder="Fraktion" class="faction-value col-span-6 bg-black/20 border border-gray-700 rounded p-1 text-xs outline-none" value="${f}"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold">×</button></div>`;
        window.addFactionRow = () => document.getElementById('factionList').insertAdjacentHTML('beforeend', window.createFactionRow());
        window.saveFactions = () => { factions = {}; document.querySelectorAll('.faction-row').forEach(r => { const n = r.querySelector('.faction-name').value; if(n) factions[n] = r.querySelector('.faction-value').value; }); window.closeModal('factionModal'); renderApp(); };
        window.resetApp = () => { window.customConfirm("Alles löschen?", () => location.reload()); };
        window.confirmDeleteEvent = () => { const id = parseInt(document.getElementById('editId').value); window.customConfirm("Löschen?", () => { events = events.filter(e => e.id !== id); window.closeModal('editModal'); renderApp(); }); };
        function copyToClipboard(t) { const d = document.createElement("input"); document.body.appendChild(d); d.value = t; d.select(); document.execCommand("copy"); document.body.removeChild(d); }
        function showCopySuccess(t) { const m = document.getElementById('copySuccessMsg'); m.textContent = t; m.classList.remove('opacity-0'); setTimeout(() => m.classList.add('opacity-0'), 2000); }
        window.customAlert = (msg) => { document.getElementById('dialogMessage').textContent = msg; document.getElementById('dialogButtons').innerHTML = `<button onclick="window.closeDialog()" class="px-6 py-2 bg-blue-600 rounded text-white text-sm font-bold">OK</button>`; document.getElementById('dialogModal').classList.remove('opacity-0', 'pointer-events-none'); };
        window.customConfirm = (msg, onC) => { document.getElementById('dialogMessage').textContent = msg; window._cC = onC; document.getElementById('dialogButtons').innerHTML = `<button onclick="window.closeDialog()" class="px-4 py-2 bg-gray-800 rounded text-gray-300 text-xs">Abbrechen</button><button onclick="window.exC()" class="px-4 py-2 bg-red-600 rounded text-white text-xs font-bold">Bestätigen</button>`; document.getElementById('dialogModal').classList.remove('opacity-0', 'pointer-events-none'); };
        window.closeDialog = () => { document.getElementById('dialogModal').classList.add('opacity-0', 'pointer-events-none'); };
        window.exC = () => { if(window._cC) window._cC(); window.closeDialog(); };

        document.getElementById('modalNotes').addEventListener('input', e => { if(currentOpenEventId) eventNotes[currentOpenEventId] = e.target.value; });
        window.addEventListener('load', () => { const s = new URLSearchParams(window.location.search).get('scenario'); if(s) { const dec = decodeScenario(s); if(dec) applyImportedData(JSON.parse(dec)); window.history.replaceState({}, "", window.location.pathname); } });

        applyFontsAndTheme(appFontHeading, appFontBody, themeSettings);
        renderApp();
    </script>
</body>
</html>
