<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenario Log v1.19.0 - Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <style>
        :root {
            --bg: #030712;
            --surface: #111827;
            --text: #f3f4f6;
            --accent-rgb: 34, 197, 94;
            --radius: 8px;
        }
        [x-cloak] { display: none !important; }
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bg-surface { background-color: var(--surface); }
        .text-accent { color: rgb(var(--accent-rgb)); }
        .bg-accent { background-color: rgb(var(--accent-rgb)); }
        .border-accent { border-color: rgb(var(--accent-rgb)); }
        .rounded-theme { border-radius: var(--radius); }

        /* Drag and Drop Visuals */
        [data-drag-id], .act-drop-zone { position: relative; }
        .drag-over::before { 
            content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 4px;
            background-color: rgb(var(--accent-rgb)); box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.5);
            border-radius: 2px; z-index: 50; pointer-events: none;
        }

        .dragging { opacity: 0.2; transform: scale(0.98); }
        .dragging * { pointer-events: none !important; }

        .act-drop-zone { height: 30px; margin-top: -10px; transition: all 0.2s; border-radius: var(--radius); }
        .act-drop-zone.drag-over { background: rgba(var(--accent-rgb), 0.05); }

        /* Markdown Styling */
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .markdown-content strong { color: rgb(var(--accent-rgb)); font-weight: bold; }
        .markdown-content em { font-style: italic; opacity: 0.9; }
        .markdown-content u { text-decoration: underline; text-underline-offset: 4px; }

        /* Input Clear Wrapper */
        .input-container { position: relative; display: flex; align-items: center; width: 100%; }
        .clear-btn { 
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; display: none; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 50%; color: #6b7280;
            font-size: 12px; cursor: pointer; border: none; transition: all 0.2s;
            z-index: 10;
        }
        .input-container input:not(:placeholder-shown) + .clear-btn { display: flex; }
        .input-container:hover .clear-btn { opacity: 1; }
        .clear-btn:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        /* Markdown Toolbar */
        .md-toolbar {
            display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
            border-top-left-radius: 4px; border-top-right-radius: 4px;
        }
        .md-btn {
            padding: 2px 8px; font-size: 10px; font-weight: bold; color: #9ca3af;
            border-radius: 3px; transition: all 0.2s;
        }
        .md-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

        /* Navigation Responsive */
        @media (max-width: 768px) {
            .app-container { padding-bottom: 120px; padding-right: 1rem; }
            .nav-container { 
                position: fixed; bottom: 0; left: 0; width: 100%; 
                display: flex; justify-content: space-around; align-items: center; 
                background: var(--surface); border-top: 1px solid rgba(255,255,255,0.1);
                padding: 12px 12px 32px 12px; z-index: 50;
                gap: 8px;
            }
            .sidebar-desktop { display: none; }
        }
        @media (min-width: 769px) {
            .app-container { padding-right: 100px; }
            .nav-container { display: none; }
            .sidebar-desktop { 
                position: fixed; right: 24px; top: 50%; transform: translateY(-50%); 
                display: flex; flex-direction: column; gap: 12px; z-index: 50;
            }
        }

        /* Slideshow Specific */
        #slideshowModal .slide-card {
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 100%;
            width: 100%;
            touch-action: pan-y;
        }
        
        .slide-scroll-area {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .slide-scroll-area::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <datalist id="actDatalist"></datalist>
    <datalist id="locationsDatalist"></datalist>
    <datalist id="factionsDatalist"></datalist>

    <nav class="sidebar-desktop">

        </button>
        <button onclick="window.openEditModal()" title="Neues Ereignis" class="p-4 bg-blue-600 hover:opacity-90 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
        </button>
        <button onclick="window.openFactionModal()" title="Figuren & Fraktionen" class="p-4 bg-orange-600 hover:opacity-90 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
        </button>
        <button onclick="window.openLocationManager()" title="Schauplatz-Verwaltung" class="p-4 bg-emerald-700 hover:opacity-90 rounded-full shadow-lg transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
        <div class="h-px bg-gray-800 my-2"></div>
        <button onclick="window.exportToJSON()" title="Export als Datei" class="p-3 bg-gray-700 hover:opacity-90 rounded-full transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
        </button>
        <button onclick="document.getElementById('importFile').click()" title="Import aus Datei" class="p-3 bg-gray-700 hover:opacity-90 rounded-full transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"></path></svg>
        </button>
        <button onclick="window.resetApp()" title="Reset" class="p-3 bg-red-900/50 hover:bg-red-800 rounded-full transition-transform hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5 text-red-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"></path></svg>
        </button>
    </nav>

    <nav class="nav-container">
        <button onclick="window.startSlideshow()" class="p-3 bg-accent rounded-full text-white shadow-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></button>
        <button onclick="window.openEditModal()" class="p-3 bg-blue-600 rounded-full text-white shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></button>
        <button onclick="window.openFactionModal()" class="p-3 bg-orange-600 rounded-full text-white shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg></button>
        <button onclick="window.openLocationManager()" class="p-3 bg-emerald-700 rounded-full text-white shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg></button>
        <button onclick="window.exportToJSON()" class="p-3 bg-gray-700 rounded-full text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12l-4-4m4 4l4-4m-4 4V3"></path></svg></button>
    </nav>

    <div id="app" class="app-container p-4 md:p-8"></div>

    <!-- Modals -->

        <div class="flex justify-between items-center p-6 md:p-8 shrink-0 no-select">

                </div>
            </div>
            <button onclick="window.closeModal('slideshowModal')" class="p-2 text-gray-500 hover:text-white transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg>
            </button>
        </div>
        <div class="flex-1 flex items-center justify-center px-4 pt-2 pb-4 md:px-12 md:pb-6 overflow-hidden">

                <div class="flex items-center gap-6 p-6 md:p-10 border-b border-gray-800 shrink-0 no-select cursor-pointer">

                        </div>
                        <div id="slideInfoCol">
                            <h4 class="text-accent text-[10px] uppercase font-bold mb-4 tracking-widest opacity-60">GM Informationen</h4>
                            <div id="slideDesc" class="text-gray-300 leading-relaxed text-sm md:text-base markdown-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-4 md:p-6 shrink-0 flex flex-col items-center gap-3 bg-black/40 backdrop-blur-md pb-6 md:pb-8 no-select">
            <div class="flex items-center gap-6">

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-gray-400 text-xs mb-1 uppercase font-bold">Akt</label>
                        <input type="text" id="editAct" list="actDatalist" class="w-full bg-black/20 border border-gray-700 rounded p-2 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs mb-1 uppercase font-bold">Titel</label>
                        <input type="text" id="editTitle" class="w-full bg-black/20 border border-gray-700 rounded p-2 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 text-xs mb-2 uppercase font-bold tracking-wider">Symbol</label>
                    <div id="iconSelectionContainer" class="flex flex-wrap gap-2 p-2 bg-black/20 rounded-theme border border-gray-800"></div>
                    <input type="hidden" id="editIcon">
                </div>
                <div>
                    <label class="block text-blue-400/80 text-xs mb-1 uppercase font-bold">Vorlesetext (Markdown)</label>
                    <textarea id="editFluff" class="w-full bg-black/20 border border-gray-700 rounded p-2 text-blue-200 italic min-h-[100px]"></textarea>
                </div>
                <div>
                    <label class="block text-gray-400 text-xs mb-1 uppercase font-bold">GM Info (Markdown)</label>
                    <textarea id="editDesc" class="w-full bg-black/20 border border-gray-700 rounded p-2 min-h-[150px]"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-gray-800 flex justify-between items-center">
                <button id="btnDeleteEvent" onclick="window.confirmDeleteEvent()" class="px-4 py-2 bg-red-900/30 text-red-400 rounded hover:bg-red-800/60 transition-colors">Löschen</button>
                <div class="flex gap-3">
                    <button onclick="window.closeModal('editModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded">Abbrechen</button>
                    <button onclick="window.saveEvent(); window.closeModal('editModal')" class="px-6 py-2 bg-blue-600 font-bold text-white rounded">Speichern</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Location Manager -->
    <div id="locationManagerModal" class="fixed inset-0 z-[70] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-emerald-500/50 rounded-theme max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <h3 class="text-xl font-bold text-emerald-400 uppercase tracking-wider">Schauplätze</h3>
                <button onclick="window.closeModal('locationManagerModal')" class="text-gray-500 hover:text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-6" id="locationManagerList"></div>
            <div class="p-4 border-t border-gray-800 flex justify-end">
                <button onclick="window.closeModal('locationManagerModal')" class="px-6 py-2 bg-emerald-600 rounded font-bold text-white">Fertig</button>
            </div>
        </div>
    </div>

    <!-- Faction Modal -->
    <div id="factionModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface border border-orange-500/50 rounded-theme max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0"><h3 class="text-xl font-bold text-orange-400 uppercase tracking-wider">Figuren</h3><button onclick="window.closeModal('factionModal')" class="text-gray-500 hover:text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button></div>

            <div class="p-4 border-t border-gray-800 flex justify-end gap-3"><button onclick="window.closeModal('factionModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded">Abbrechen</button><button onclick="window.saveFactions(); window.closeModal('factionModal')" class="px-6 py-2 bg-orange-600 rounded font-bold text-white">Speichern</button></div>
        </div>
    </div>

            Radio: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5M12 12m-2 0a2 2 0 1 0 4 0 2 2 0 1 0-4 0M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5M19.1 4.9C23 8.8 23 15.1 19.1 19" stroke-width="2"></path></svg>`,
            Crosshair: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"></circle><path d="M22 12h-4M6 12H2M12 6V2M12 22v-4" stroke-width="2"></path></svg>`,
            DragVertical: `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>`,
            Zap: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-width="2"></path></svg>`,
            Target: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"></circle><circle cx="12" cy="12" r="6" stroke-width="2"></circle><circle cx="12" cy="12" r="2" stroke-width="2"></circle></svg>`,
            MapPin: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke-width="2"></path><circle cx="12" cy="10" r="3" stroke-width="2"></circle></svg>`,
            Eye: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-width="2"></path><circle cx="12" cy="12" r="3" stroke-width="2"></circle></svg>`,
            Lock: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-width="2"></path></svg>`,
            Unlock: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1" stroke-width="2"></path></svg>`,
            Terminal: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 17l6-6-6-6M12 19h8" stroke-width="2"></path></svg>`,
            Users: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2"></path><circle cx="9" cy="7" r="4" stroke-width="2"></circle></svg>`,
            Settings: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="2"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09" stroke-width="2"></path></svg>`
        };

        // Persistent State (Local Memory Only)
        let appTitle = "Scenario Log";
        let appSubtitle = "INCIDENT PROTOCOL // SYSTEM ONLINE";
        let events = [];
        let factions = {};
        let locationsData = {};
        let expandedIds = new Set();
        let checkedIds = new Set();
        let collapsedActs = new Set();
        let draggedEventId = null;
        let clickTimers = {};
        let slideshowIndex = 0;
        let slideshowInterval = null;

        function renderApp() {
            const app = document.getElementById('app');
            const grouped = events.reduce((acc, e) => { if (!acc[e.act]) acc[e.act] = []; acc[e.act].push(e); return acc; }, {});
            
            document.getElementById('actDatalist').innerHTML = Object.keys(grouped).map(a => `<option value="${a}">`).join('');
            document.getElementById('factionsDatalist').innerHTML = Object.keys(factions).map(f => `<option value="${f}">`).join('');
            document.getElementById('locationsDatalist').innerHTML = [...new Set(events.flatMap(e => e.locations || []))].map(l => `<option value="${l}">`).join('');

            let html = `<div class="max-w-4xl mx-auto"><header class="mb-12 border-b border-gray-800 pb-6 no-select"><div class="flex items-center gap-4 group cursor-pointer"><div class="text-accent">${icons.AppIcon}</div><div><h1 class="text-3xl md:text-5xl font-bold text-accent uppercase font-heading tracking-tighter leading-none">${appTitle}</h1><p class="opacity-60 text-[10px] md:text-xs uppercase tracking-[0.2em] font-bold mt-1">${appSubtitle}</p></div></div></header><div class="space-y-12">`;

            if (Object.keys(grouped).length === 0) {
                html += `<div class="text-center py-20 border-2 border-dashed border-gray-800 rounded-theme opacity-50">Keine Ereignisse vorhanden. Nutze das Plus-Icon, um zu starten.</div>`;
            }

            for (const [actName, actEvents] of Object.entries(grouped)) {
                const isC = collapsedActs.has(actName);
                html += `<div><div onclick="window.toggleAct('${actName}')" class="sticky top-0 z-10 py-4 mb-6 cursor-pointer flex items-center gap-3 no-select" style="background-color: var(--bg)"><div class="opacity-40">${isC ? icons.ChevronRight : icons.ChevronDown}</div><h2 class="text-xl md:text-2xl font-bold uppercase border-l-4 border-accent pl-4 text-accent font-heading">${actName}</h2></div><div class="border-l-2 border-gray-800 ml-4 md:ml-8 space-y-6 ${isC ? 'hidden' : ''}">`;
                actEvents.forEach(e => {
                    const isExpanded = expandedIds.has(e.id);
                    html += `<div class="relative pl-8 md:pl-12 group" data-drag-id="${e.id}" draggable="true" ondragstart="window.handleDragStart(event, ${e.id})" ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, ${e.id}, '${actName}')" ondragend="window.handleDragEnd(event)"><div class="absolute left-0 top-6 opacity-20 md:group-hover:opacity-100 cursor-grab">${icons.DragVertical}</div><div class="absolute -left-[17px] top-4 w-8 h-8 rounded-full border-2 flex items-center justify-center bg-surface ${e.type === 'Optional' ? 'border-dashed opacity-40' : 'border-accent text-accent'}">${icons[e.icon] || icons.Rocket}</div><div onclick="window.handleInteraction(event, ${e.id})" class="w-full text-left p-4 rounded-theme border border-gray-800 transition-all hover:border-accent/40 no-select bg-surface/40 cursor-pointer"><div class="flex justify-between gap-4"><div class="flex items-start gap-3"><div onclick="window.toggleCheckbox(event, ${e.id})" class="mt-1 opacity-50 hover:text-accent">${checkedIds.has(e.id) ? icons.CheckSquare : icons.Square}</div><div><h3 class="text-base md:text-lg font-bold font-heading ${checkedIds.has(e.id) ? 'line-through opacity-40' : ''}">${e.title}</h3></div></div></div><div class="${isExpanded ? 'mt-4' : 'hidden'}"><div class="text-blue-200 italic mb-4 markdown-content">${marked.parse(e.fluff || "")}</div><div class="text-gray-300 markdown-content">${marked.parse(e.description || "")}</div><button onclick="window.openEditModal(${e.id})" class="mt-4 px-3 py-1 bg-gray-800 rounded text-xs hover:bg-gray-700">Bearbeiten</button></div></div></div>`;
                });
                html += `<div class="act-drop-zone" ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, null, '${actName}')"></div></div></div>`;
            }
            app.innerHTML = html + `</div>`;
        }

        // Action Handlers
        window.saveEvent = () => {
            const idVal = document.getElementById('editId').value;
            const id = idVal ? parseInt(idVal) : Date.now();
            const data = {
                id,
                act: document.getElementById('editAct').value || "Akt I",
                title: document.getElementById('editTitle').value || "Unbenanntes Ereignis",
                icon: document.getElementById('editIcon').value || "Rocket",
                fluff: document.getElementById('editFluff').value,
                description: document.getElementById('editDesc').value,
                locations: [], figures: []
            };
            const idx = events.findIndex(e => e.id === id);
            if (idx > -1) events[idx] = data; else events.push(data);
            renderApp();
        };

        window.toggleCheckbox = (ev, id) => {
            ev.stopPropagation();
            checkedIds.has(id) ? checkedIds.delete(id) : checkedIds.add(id);
            renderApp();
        };

        window.handleInteraction = (ev, id) => {
            expandedIds.has(id) ? expandedIds.delete(id) : expandedIds.add(id);
            renderApp();
        };

        window.openEditModal = (id = null) => {
            const e = events.find(ev => ev.id === id) || { act: "Akt I", title: "", icon: "Rocket", fluff: "", description: "" };
            document.getElementById('editId').value = id || "";
            document.getElementById('editAct').value = e.act;
            document.getElementById('editTitle').value = e.title;
            document.getElementById('editFluff').value = e.fluff;
            document.getElementById('editDesc').value = e.description;
            window.renderIconSelection(e.icon);
            document.getElementById('editModal').classList.remove('opacity-0', 'pointer-events-none');
        };

        window.renderIconSelection = (s) => {
            const c = document.getElementById('iconSelectionContainer');
            const list = ["Rocket", "Zap", "Target", "MapPin", "Skull", "Radio", "Crosshair", "AlertCircle", "Eye", "Terminal", "Users", "Lock"];
            c.innerHTML = list.map(i => `<button onclick="window.selectIcon('${i}')" class="p-3 border-2 rounded-theme ${s===i?'border-accent bg-accent/20 text-accent':'opacity-40 border-gray-700'}">${icons[i]}</button>`).join('');
            document.getElementById('editIcon').value = s;
        };

        window.selectIcon = (i) => window.renderIconSelection(i);

        window.closeModal = (id) => document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');

        // Import / Export Logic (Manual File Persistence)
        window.exportToJSON = () => {
            const data = { appTitle, events, factions, locationsData, checkedIds: Array.from(checkedIds), collapsedActs: Array.from(collapsedActs) };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `scenario-log-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        window.handleImport = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    appTitle = data.appTitle || "Scenario Log";
                    events = data.events || [];
                    factions = data.factions || {};
                    locationsData = data.locationsData || {};
                    checkedIds = new Set(data.checkedIds || []);
                    collapsedActs = new Set(data.collapsedActs || []);
                    renderApp();
                } catch (err) { alert("Fehler beim Import der Datei."); }
            };
            reader.readAsText(file);
        };

        window.resetApp = () => { if(confirm("Sicher? Alle ungespeicherten Daten gehen verloren.")) { events=[]; renderApp(); } };

        // Initial Start
        window.onload = () => { renderApp(); };

        // Slideshow logic (basic)
        window.startSlideshow = () => {
            if (events.length === 0) return;
            slideshowIndex = 0;
            document.getElementById('slideshowModal').classList.remove('opacity-0', 'pointer-events-none');
            updateSlide();
        };
        function updateSlide() {
            const e = events[slideshowIndex];
            document.getElementById('slideEventTitle').textContent = e.title;
            document.getElementById('slideFluff').innerHTML = marked.parse(e.fluff || "");
            document.getElementById('slideDesc').innerHTML = marked.parse(e.description || "");
            document.getElementById('slideCounter').textContent = `Ereignis ${slideshowIndex + 1} / ${events.length}`;
            document.getElementById('slideEventIcon').innerHTML = icons[e.icon] || icons.Rocket;
        }
        window.nextSlide = () => { slideshowIndex = (slideshowIndex + 1) % events.length; updateSlide(); };
        window.prevSlide = () => { slideshowIndex = (slideshowIndex - 1 + events.length) % events.length; updateSlide(); };

        // Drag & Drop
        window.handleDragStart = (e, id) => { draggedEventId = id; e.target.classList.add('dragging'); };
        window.handleDragOver = (e) => { e.preventDefault(); e.target.closest('[data-drag-id], .act-drop-zone')?.classList.add('drag-over'); };
        window.handleDragLeave = (e) => e.target.closest('[data-drag-id], .act-drop-zone')?.classList.remove('drag-over');
        window.handleDragEnd = (e) => e.target.classList.remove('dragging');
        window.handleDrop = (e, targetId, targetAct) => {
            e.preventDefault();
            const dIdx = events.findIndex(ev => ev.id === draggedEventId);
            if (dIdx === -1) return;
            const [item] = events.splice(dIdx, 1);
            item.act = targetAct;
            const tIdx = targetId ? events.findIndex(ev => ev.id === targetId) : -1;
            if (tIdx > -1) events.splice(tIdx, 0, item); else events.push(item);
            renderApp();
        };
        window.toggleAct = (a) => { collapsedActs.has(a) ? collapsedActs.delete(a) : collapsedActs.add(a); renderApp(); };
    </script>
</body>
</html>
