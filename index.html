<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scenario Log v1.5.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        [x-cloak] { display: none !important; }
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
        
        /* Drag and Drop Visuals */
        .drag-over { 
            border-top: 2px solid #4ade80 !important;
            padding-top: 1rem !important;
        }
        .dragging { 
            opacity: 0.4;
            transform: scale(0.98);
        }
        .drop-target-act {
            background: rgba(74, 222, 128, 0.05) !important;
            border-color: rgba(74, 222, 128, 0.2) !important;
        }

        /* Markdown Styling Fixes für Dark Mode */
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .markdown-content strong { color: #4ade80; font-weight: bold; }
        .markdown-content em { font-style: italic; opacity: 0.9; }
    </style>
</head>
<body class="bg-gray-950 text-green-50 min-h-screen relative transition-all duration-300">

    <input type="file" id="importFile" accept=".json" class="hidden" onchange="window.handleImport(event)">

    <!-- Sticky Side Bar -->
    <div class="fixed right-4 top-1/2 -translate-y-1/2 z-40 flex flex-col gap-3">
        <button onclick="window.openEditModal()" title="Neues Ereignis" class="p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full shadow-lg shadow-blue-900/40 transition-all hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button onclick="window.openFactionModal()" title="Figuren verwalten" class="p-3 bg-orange-600 hover:bg-orange-500 text-white rounded-full shadow-lg shadow-orange-900/40 transition-all hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </button>
        <div class="w-full h-px bg-gray-800 my-1"></div>
        <button onclick="window.openExportModal()" title="Exportieren" class="p-3 bg-green-700 hover:bg-green-600 text-white rounded-full shadow-lg transition-all hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
        <button onclick="document.getElementById('importModal').classList.remove('opacity-0', 'pointer-events-none')" title="Importieren" class="p-3 bg-gray-700 hover:bg-gray-600 text-white rounded-full shadow-lg transition-all hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </button>
        <button onclick="window.resetApp()" title="Reset" class="p-3 bg-red-900/50 hover:bg-red-800 text-red-200 rounded-full shadow-lg transition-all hover:scale-110 flex items-center justify-center">
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        </button>
    </div>

    <div id="app" class="p-4 md:p-8 pb-32 pr-20 md:pr-24">
        <!-- Der Inhalt wird per JavaScript geladen -->
    </div>

    <!-- Modals -->
    <!-- Event Details Modal -->
    <div id="eventModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">

                <button onclick="window.closeModal('eventModal')" class="text-gray-500 hover:text-red-500 transition-colors p-1">

                </button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6 flex-1">

                        <div id="modalFluff"></div>
                    </div>
                </div>
                <div>
                    <h4 class="text-gray-500 text-sm uppercase tracking-wider mb-2 border-b border-gray-800 pb-1">GM Informationen</h4>

                </div>

    <!-- Export Modal -->

    <!-- Import Modal -->

            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-950/80 rounded-t-lg shrink-0">
                <h3 class="text-xl font-bold text-gray-300 uppercase tracking-wider">Daten importieren</h3>
                <button onclick="window.closeModal('importModal')" class="text-gray-500 hover:text-red-500 p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-6 flex-1 overflow-y-auto">
                <div>
                    <h4 class="text-gray-400 text-sm font-bold uppercase tracking-wider mb-2">1. Datei-Upload</h4>
                    <button onclick="document.getElementById('importFile').click()" class="w-full px-4 py-3 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded text-gray-200">JSON Datei auswählen</button>
                </div>
                <div class="h-px bg-gray-800 w-full"></div>
                <div>
                    <h4 class="text-gray-400 text-sm font-bold uppercase tracking-wider mb-2">2. URL Import</h4>
                    <div class="flex gap-2">
                        <input type="text" id="importUrlInput" class="flex-1 bg-gray-950 border border-gray-700 rounded p-3 text-sm text-gray-200" placeholder="https://...">
                        <button onclick="window.importFromUrl()" class="px-4 bg-blue-900/40 hover:bg-blue-800 border border-blue-700 rounded text-blue-400 font-bold">Laden</button>

                <div class="h-px bg-gray-800 w-full"></div>

                    </div>

    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 border border-blue-500/50 rounded-lg max-w-3xl w-full mx-4 shadow-2xl flex flex-col max-h-[95vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-950/80 rounded-t-lg shrink-0">
                <h3 id="editModalTitle" class="text-xl font-bold text-blue-400 uppercase tracking-wider">Ereignis bearbeiten</h3>
                <button onclick="window.closeModal('editModal')" class="text-gray-500 hover:text-red-500 p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto space-y-5 flex-1 text-sm">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Akt</label><input type="text" id="editAct" list="actDatalist" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-blue-500 outline-none"><datalist id="actDatalist"></datalist></div>
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Titel</label><input type="text" id="editTitle" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-blue-500 outline-none"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" id="editTypeCheckbox" class="w-5 h-5 rounded bg-gray-950 border-gray-700 text-blue-600 focus:ring-0"><span class="text-gray-200 font-bold uppercase tracking-wider text-xs">Notwendiges Ereignis</span></label>
                    <div><label class="block text-gray-400 text-xs mb-2 uppercase tracking-wider">Icon</label><div id="iconSelectionContainer" class="flex flex-wrap gap-2"></div><input type="hidden" id="editIcon" value="Rocket"></div>
                </div>
                <div><label class="block text-blue-400/80 text-xs mb-1 uppercase tracking-wider">Vorlesetext (Markdown)</label><textarea id="editFluff" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-blue-200 italic focus:border-blue-500 outline-none min-h-[100px] resize-y"></textarea></div>
                <div><label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">GM Beschreibung (Markdown)</label><textarea id="editDesc" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-blue-500 outline-none min-h-[150px] resize-y"></textarea></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Schauplätze</label><div class="flex gap-2 mb-2"><input type="text" id="tagInputLocations" list="locationsDatalist" class="flex-1 bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-blue-500 outline-none"><button onclick="window.addTag('Locations')" class="px-3 bg-gray-800 rounded text-gray-300 hover:bg-gray-700">+</button></div><datalist id="locationsDatalist"></datalist><div id="tagListLocations" class="flex flex-wrap gap-2"></div></div>
                    <div><label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Figuren</label><div class="flex gap-2 mb-2"><input type="text" id="tagInputFigures" list="factionsDatalist" class="flex-1 bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-blue-500 outline-none"><button onclick="window.addTag('Figures')" class="px-3 bg-gray-800 rounded text-gray-300 hover:bg-gray-700">+</button></div><datalist id="factionsDatalist"></datalist><div id="tagListFigures" class="flex flex-wrap gap-2"></div></div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-800 bg-gray-950/80 flex justify-between items-center shrink-0">

                <div class="flex gap-3"><button onclick="window.closeModal('editModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded hover:bg-gray-700">Abbrechen</button><button onclick="window.saveEvent()" class="px-6 py-2 bg-blue-600 font-bold text-white rounded hover:bg-blue-500 shadow-lg">Speichern</button></div>
            </div>
        </div>
    </div>

    <!-- Faction Modal -->
    <div id="factionModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 border border-orange-500/50 rounded-lg max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-950/80 rounded-t-lg shrink-0">
                <h3 class="text-xl font-bold text-orange-400 uppercase tracking-wider">Figuren verwalten</h3>
                <button onclick="window.closeModal('factionModal')" class="text-gray-500 hover:text-red-500 p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>

            <div class="p-6 overflow-y-auto flex-1">
                <div id="factionList" class="space-y-2"></div>

    <!-- Header Design Modal -->

            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-950/80 rounded-t-lg shrink-0">
                <h3 class="text-xl font-bold text-green-400 uppercase tracking-wider">Titel & Design</h3>
                <button onclick="window.closeModal('headerModal')" class="text-gray-500 hover:text-red-500 p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-6 space-y-5 flex-1">
                <div><label class="block text-gray-400 uppercase text-xs mb-1 tracking-wider">Haupttitel</label><input type="text" id="editAppTitle" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-green-500 outline-none"></div>
                <div><label class="block text-gray-400 uppercase text-xs mb-1 tracking-wider">Untertitel</label><input type="text" id="editAppSubtitle" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-green-500 outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-gray-400 text-xs mb-1 tracking-wider uppercase">Font Heading</label><select id="editAppFontHeading" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-green-500 outline-none"><option value="Orbitron">Orbitron</option><option value="Space Mono">Space Mono</option><option value="Rajdhani">Rajdhani</option><option value="Exo 2">Exo 2</option><option value="Inter">Inter</option></select></div>
                    <div><label class="block text-gray-400 text-xs mb-1 tracking-wider uppercase">Font Body</label><select id="editAppFontBody" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-gray-200 focus:border-green-500 outline-none"><option value="Inter">Inter</option><option value="Space Mono">Space Mono</option><option value="Roboto">Roboto</option><option value="Rajdhani">Rajdhani</option></select></div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-800 bg-gray-950/80 flex justify-end gap-3 shrink-0"><button onclick="window.closeModal('headerModal')" class="px-4 py-2 bg-gray-800 text-gray-300 rounded">Abbrechen</button><button onclick="window.saveHeader()" class="px-6 py-2 bg-green-600 font-bold text-white rounded">Speichern</button></div>
        </div>
    </div>

    <div id="dialogModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 border border-gray-600 rounded-lg max-w-sm w-full mx-4 shadow-2xl p-6 text-center">
            <p id="dialogMessage" class="text-gray-200 text-sm mb-6"></p>
            <div class="flex justify-center gap-3" id="dialogButtons"></div>
        </div>
    </div>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        // --- GLOBAL STATE ---
        let appTitle = "Scenario Log";
        let appSubtitle = "USCSS CRONUS INCIDENT TERMINAL // EVENT PROTOCOL";
        let appFontHeading = "Orbitron"; 
        let appFontBody = "Inter";
        let expandedId = null;
        let checkedIds = new Set();
        let collapsedActs = new Set();
        let clickTimers = {};
        let eventNotes = {};
        let currentOpenEventId = null;
        let currentEditingTags = { Locations: [], Figures: [] };
        let draggedEventId = null;

        let factions = {};
        let actData = {};
        let events = [];

        // --- I/O SYSTEMS ---
        function encodeScenario(str) { return btoa(unescape(encodeURIComponent(str))); }
        function decodeScenario(b64) { return decodeURIComponent(escape(atob(b64))); }
        
        function getExportData() { 
            return JSON.stringify({ 
                appTitle, appSubtitle, appFontHeading, appFontBody, factions, events, actData, eventNotes, 
                checkedIds: Array.from(checkedIds), collapsedActs: Array.from(collapsedActs) 
            }, null, 2); 
        }

        window.triggerDownloadFile = function() {
            const data = getExportData();
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${appTitle.replace(/\s+/g, '_')}_Save.json`; a.click();
            URL.revokeObjectURL(url);
        };

        window.openExportModal = () => { document.getElementById('exportTextarea').value = getExportData(); document.getElementById('exportModal').classList.remove('opacity-0', 'pointer-events-none'); };
        window.copyExportToClipboard = () => { const tx = document.getElementById('exportTextarea'); tx.select(); document.execCommand('copy'); showCopySuccess("JSON kopiert!"); };
        window.copySeedToClipboard = () => { const seed = encodeScenario(getExportData()); copyToClipboard(seed); showCopySuccess("Seed kopiert!"); };
        window.generateAndCopyShareLink = () => { const seed = encodeScenario(getExportData()); copyToClipboard(window.location.origin + window.location.pathname + '?scenario=' + seed); showCopySuccess("Link kopiert!"); };

        window.importFromSeedText = () => { try { applyImportedData(JSON.parse(decodeScenario(document.getElementById('importSeedInput').value.trim()))); window.closeModal('importModal'); } catch(e) { window.customAlert("Ungültiger Seed!"); } };
        window.importFromJsonText = () => { try { applyImportedData(JSON.parse(document.getElementById('importJsonInput').value)); window.closeModal('importModal'); } catch(e) { window.customAlert("JSON Fehler!"); } };
        window.importFromUrl = async () => {
            const url = document.getElementById('importUrlInput').value.trim();
            if(!url) return;
            try { const res = await fetch(url); applyImportedData(await res.json()); window.closeModal('importModal'); } catch(e) { window.customAlert("URL Fehler!"); }
        };
        window.handleImport = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => { try { applyImportedData(JSON.parse(ev.target.result)); window.closeModal('importModal'); } catch(ex){} };
            r.readAsText(f);
        };

        function applyImportedData(data) {
            if(!data) return;
            appTitle = data.appTitle || "Scenario Log";
            appSubtitle = data.appSubtitle || "";
            appFontHeading = data.appFontHeading || "Orbitron";
            appFontBody = data.appFontBody || "Inter";
            factions = data.factions || {};
            actData = data.actData || {};
            eventNotes = data.eventNotes || {};
            checkedIds = new Set(data.checkedIds || []);
            collapsedActs = new Set(data.collapsedActs || []);

            if (data.events && Array.isArray(data.events)) {
                events = data.events.map(ev => ({
                    ...ev,
                    locations: Array.isArray(ev.locations) ? ev.locations : (ev.locations ? ev.locations.split(',').map(s => s.trim()) : []),
                    figures: Array.isArray(ev.figures) ? ev.figures : (ev.figures ? ev.figures.split(',').map(s => s.trim()) : [])
                }));
            } else {
                events = [];
            }

            applyFonts(appFontHeading, appFontBody);
            renderApp();
        }

        // --- DRAG AND DROP LOGIC (v1.5.4) ---
        window.handleDragStart = (e, id) => {
            draggedEventId = id;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        };

        window.handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('[data-drag-id]');
            if (target) target.classList.add('drag-over');
            
            const actHeader = e.target.closest('[data-act-drop]');
            if (actHeader) actHeader.classList.add('drop-target-act');
        };

        window.handleDragLeave = (e) => {
            const target = e.target.closest('[data-drag-id]');
            if (target) target.classList.remove('drag-over');

            const actHeader = e.target.closest('[data-act-drop]');
            if (actHeader) actHeader.classList.remove('drop-target-act');
        };

        window.handleDrop = (e, targetId, targetAct) => {
            e.preventDefault();
            document.querySelectorAll('.drag-over, .drop-target-act').forEach(el => el.classList.remove('drag-over', 'drop-target-act'));
            
            if (draggedEventId === null) return;
            
            const draggedIdx = events.findIndex(ev => ev.id === draggedEventId);
            const targetIdx = targetId ? events.findIndex(ev => ev.id === targetId) : -1;
            
            if (draggedIdx === -1) return;

            const [draggedItem] = events.splice(draggedIdx, 1);
            
            // Wenn in einen Akt gedroppt wird, ändere den Akt des Items
            if (targetAct) draggedItem.act = targetAct;

            if (targetIdx !== -1) {
                // An Position des Targets schieben (evtl. Index korrigieren wenn davor verschoben)
                const newIdx = events.findIndex(ev => ev.id === targetId);
                events.splice(newIdx, 0, draggedItem);
            } else {
                // Einfach ans Ende des Arrays (oder ans Ende des Aktes durch renderApp sortiert)
                events.push(draggedItem);
            }

            draggedEventId = null;
            renderApp();
        };

        window.handleDragEnd = (e) => {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drag-over, .drop-target-act').forEach(el => el.classList.remove('drag-over', 'drop-target-act'));
        };

        // --- RENDER LOGIC ---
        function applyFonts(h, b) {
            document.querySelectorAll('.dynamic-font').forEach(e => e.remove());
            const link = document.createElement('link'); link.rel = 'stylesheet'; link.className = 'dynamic-font';
            link.href = `https://fonts.googleapis.com/css2?family=${h.replace(/ /g,'+')}:wght@400;700&family=${b.replace(/ /g,'+')}:wght@400;700&display=swap`;
            document.head.appendChild(link);
            const style = document.createElement('style'); style.className = 'dynamic-font';
            style.textContent = `body { font-family: "${b}", sans-serif !important; } h1,h2,h3,h4,.font-heading { font-family: "${h}", sans-serif !important; }`;
            document.head.appendChild(style);
        }

        const icons = {
            AlertCircle: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
            ShieldAlert: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>`,
            Rocket: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path></svg>`,
            CheckSquare: `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>`,
            Square: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect></svg>`,
            ChevronDown: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"></path></svg>`,
            ChevronUp: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"></path></svg>`,
            ChevronRight: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>`,
            Pencil: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
            Skull: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="12" r="1"></circle><circle cx="15" cy="12" r="1"></circle><path d="M8 20v2h8v-2"></path><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"></path></svg>`,
            Radio: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"></path><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"></path><circle cx="12" cy="12" r="2"></circle><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"></path><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"></path></svg>`,
            Crosshair: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>`,
            DragVertical: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>`
        };

        function renderApp() {
            const app = document.getElementById('app');
            const grouped = (events || []).reduce((acc, e) => { if (!acc[e.act]) acc[e.act] = []; acc[e.act].push(e); return acc; }, {});
            
            document.getElementById('actDatalist').innerHTML = Object.keys(grouped).map(a => `<option value="${a}">`).join('');
            document.getElementById('factionsDatalist').innerHTML = Object.keys(factions).map(f => `<option value="${f}">`).join('');
            document.getElementById('locationsDatalist').innerHTML = [...new Set(events.flatMap(e => e.locations || []))].map(l => `<option value="${l}">`).join('');

            let html = `<div class="max-w-4xl mx-auto"><header class="mb-12 border-b border-green-800/50 pb-6"><div class="text-left"><h1 onclick="window.openHeaderModal()" class="text-3xl md:text-5xl font-bold text-green-500 mb-2 uppercase cursor-pointer flex items-center gap-3 font-heading">${appTitle}</h1><p onclick="window.openHeaderModal()" class="text-gray-400 text-sm cursor-pointer uppercase tracking-widest">${appSubtitle}</p></div></header><div class="space-y-12">`;

            if (Object.keys(grouped).length === 0) {
                html += `<div class="text-center py-20 border-2 border-dashed border-gray-800 rounded-xl text-gray-500"><p>Keine Ereignisse vorhanden. Nutze die Sidebar (+), um zu starten.</p></div>`;
            }

            for (const [actName, actEvents] of Object.entries(grouped)) {
                const colors = actName.includes("Akt I") ? {text:"text-blue-400", border:"border-blue-500", bg:"bg-blue-900/10"} : actName.includes("Akt II") ? {text:"text-purple-400", border:"border-purple-500", bg:"bg-purple-900/10"} : {text:"text-red-400", border:"border-red-500", bg:"bg-red-900/10"};
                const isC = collapsedActs.has(actName);
                
                html += `
                <div class="relative" 
                     data-act-drop="${actName}" 
                     ondragover="window.handleDragOver(event)" 
                     ondragleave="window.handleDragLeave(event)"
                     ondrop="window.handleDrop(event, null, '${actName}')">
                    <div onclick="window.toggleAct('${actName}')" class="sticky top-0 z-10 bg-gray-950/90 py-4 mb-6 cursor-pointer flex items-center gap-3 no-select transition-all">
                        <div class="text-gray-500">${isC ? icons.ChevronRight : icons.ChevronDown}</div>
                        <h2 class="text-2xl font-bold uppercase border-l-4 pl-4 ${colors.text} ${colors.border} font-heading">${actName}</h2>
                    </div>
                    <div class="border-l-2 border-gray-800 ml-4 md:ml-8 space-y-6 ${isC ? 'hidden' : ''}">`;

                actEvents.forEach(e => {
                    const isO = e.type === 'Optional';
                    const locationsStr = Array.isArray(e.locations) ? e.locations.join(', ') : (e.locations || "");
                    const figuresStr = Array.isArray(e.figures) ? e.figures.join(', ') : (e.figures || "");

                    html += `
                    <div class="relative pl-8 md:pl-12 transition-all group" 
                         data-drag-id="${e.id}" 
                         draggable="true" 
                         ondragstart="window.handleDragStart(event, ${e.id})"
                         ondragover="window.handleDragOver(event)" 
                         ondragleave="window.handleDragLeave(event)"
                         ondrop="window.handleDrop(event, ${e.id}, '${actName}')"
                         ondragend="window.handleDragEnd(event)">
                        
                        <!-- Drag Handle -->
                        <div class="absolute left-0 top-6 text-gray-700 opacity-0 group-hover:opacity-100 transition-opacity cursor-grab">
                            ${icons.DragVertical}
                        </div>

                        <div class="absolute -left-[17px] top-4 w-8 h-8 rounded-full border-2 flex items-center justify-center bg-gray-950 ${isO ? 'border-dashed border-gray-600 text-gray-600' : colors.border + ' ' + colors.text}">
                            ${icons[e.icon] || icons.Rocket}
                        </div>
                        
                        <button onclick="window.handleInteraction(event, ${e.id})" class="w-full text-left p-4 rounded-lg border border-gray-800 transition-all ${colors.bg} hover:border-green-500/50 no-select">
                            <div class="flex justify-between gap-4">
                                <div class="flex items-start gap-3">
                                    <div onclick="window.toggleCheckbox(event, ${e.id})" class="mt-1 text-gray-400 hover:text-green-400">
                                        ${checkedIds.has(e.id) ? icons.CheckSquare : icons.Square}
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-bold font-heading ${checkedIds.has(e.id) ? 'line-through text-gray-500' : 'text-gray-100'}">${e.title}</h3>
                                        <div class="flex items-center gap-3 mt-1 flex-wrap">
                                            <span class="text-[9px] px-1.5 py-0.5 rounded uppercase font-bold ${isO ? 'bg-gray-800 text-gray-500' : 'bg-green-900/30 text-green-400'}">${e.type}</span>
                                            ${locationsStr ? `<span class="text-[9px] text-gray-500 italic max-w-full">📍 ${locationsStr}</span>` : ''}
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div onclick="window.openEditModal(${e.id}); event.stopPropagation();" class="text-gray-600 hover:text-blue-400 p-1 transition-colors">
                                        ${icons.Pencil}
                                    </div>
                                    <div class="text-gray-500">${expandedId === e.id ? icons.ChevronUp : icons.ChevronDown}</div>
                                </div>
                            </div>
                            <div class="${expandedId === e.id ? 'mt-4 max-h-[1500px]' : 'max-h-0'} overflow-hidden transition-all duration-300">
                                <div class="border-t border-gray-800 pt-4 text-sm text-gray-300 markdown-content">
                                    ${marked.parse(e.description || "")}
                                </div>
                                ${figuresStr ? `<div class="flex flex-wrap gap-2 mt-4"><span class="text-[10px] px-2 py-0.5 bg-blue-900/20 rounded border border-blue-800/30 text-blue-400">👤 ${figuresStr}</span></div>` : ''}
                            </div>
                        </button>
                    </div>`;
                });
                html += `</div></div>`;
            }
            app.innerHTML = html + `</div>`;
        }

        // --- UTILS ---
        window.closeModal = (id) => { document.getElementById(id).classList.add('opacity-0', 'pointer-events-none'); };
        window.toggleAct = (a) => { collapsedActs.has(a) ? collapsedActs.delete(a) : collapsedActs.add(a); renderApp(); };
        window.toggleCheckbox = (ev, id) => { ev.stopPropagation(); checkedIds.has(id) ? checkedIds.delete(id) : checkedIds.add(id); renderApp(); };
        window.handleInteraction = (ev, id) => {
            const time = Date.now();
            if(time - (clickTimers[id] || 0) < 300) { clearTimeout(clickTimers['t'+id]); window.openEventModal(id); }
            else { clickTimers[id] = time; clickTimers['t'+id] = setTimeout(() => { expandedId = expandedId === id ? null : id; renderApp(); }, 300); }
        };

        window.openEventModal = (id) => {
            const e = events.find(ev => ev.id === id); if(!e) return;
            currentOpenEventId = id;
            document.getElementById('modalTitle').textContent = e.title;
            document.getElementById('modalDesc').innerHTML = marked.parse(e.description || "");
            document.getElementById('modalFluffContainer').className = e.fluff ? "" : "hidden";
            document.getElementById('modalFluff').innerHTML = e.fluff ? marked.parse(e.fluff) : "";
            document.getElementById('modalLocations').textContent = Array.isArray(e.locations) ? e.locations.join(', ') : (e.locations || "N/A");
            document.getElementById('modalNotes').value = eventNotes[id] || "";
            const fl = document.getElementById('modalFigures'); fl.innerHTML = "";
            const figures = Array.isArray(e.figures) ? e.figures : (e.figures ? [e.figures] : []);
            figures.forEach(f => fl.insertAdjacentHTML('beforeend', `<li class="flex justify-between border-b border-gray-800 text-xs py-1"><span class="text-green-300 font-bold">${f}</span><span class="text-gray-500">${factions[f]||""}</span></li>`));
            document.getElementById('eventModal').classList.remove('opacity-0', 'pointer-events-none');
        };

        window.openEditModal = (id=null) => {
            const e = events.find(ev => ev.id === id) || { act: Object.keys(actData)[0]||"", title: "", type: "Notwendig", icon: "Rocket", description: "", locations: [], figures: [] };
            document.getElementById('editId').value = id || "";
            document.getElementById('editAct').value = e.act;
            document.getElementById('editTitle').value = e.title;
            document.getElementById('editTypeCheckbox').checked = e.type === "Notwendig";
            document.getElementById('editDesc').value = e.description;
            document.getElementById('editFluff').value = e.fluff || "";
            document.getElementById('editIcon').value = e.icon;
            currentEditingTags = { 
                Locations: Array.isArray(e.locations) ? [...e.locations] : (e.locations ? [e.locations] : []), 
                Figures: Array.isArray(e.figures) ? [...e.figures] : (e.figures ? [e.figures] : []) 
            };
            window.renderEditTags('Locations'); window.renderEditTags('Figures');
            window.renderIconSelection(e.icon);
            document.getElementById('btnDeleteEvent').style.display = id ? "flex" : "none";
            document.getElementById('editModal').classList.remove('opacity-0', 'pointer-events-none');
        };

        window.saveEvent = () => {
            const id = parseInt(document.getElementById('editId').value) || Date.now();
            const data = { id, act: document.getElementById('editAct').value, title: document.getElementById('editTitle').value, type: document.getElementById('editTypeCheckbox').checked ? "Notwendig" : "Optional", icon: document.getElementById('editIcon').value, fluff: document.getElementById('editFluff').value, description: document.getElementById('editDesc').value, locations: currentEditingTags.Locations, figures: currentEditingTags.Figures };
            const idx = events.findIndex(e => e.id === id);
            if(idx > -1) events[idx] = data; else events.push(data);
            if(data.act && !actData[data.act]) actData[data.act] = [];
            window.closeModal('editModal'); renderApp();
        };

        window.addTag = (t) => { const i = document.getElementById(`tagInput${t}`); const v = i.value.trim(); if(v && !currentEditingTags[t].includes(v)){ currentEditingTags[t].push(v); i.value=""; window.renderEditTags(t); } };
        window.removeTag = (t, i) => { currentEditingTags[t].splice(i,1); window.renderEditTags(t); };
        window.renderEditTags = (t) => { document.getElementById(`tagList${t}`).innerHTML = currentEditingTags[t].map((tag, i) => `<span class="bg-blue-900/40 border border-blue-700/50 text-blue-300 px-2 py-1 rounded text-[10px] flex items-center gap-2">${tag}<button onclick="window.removeTag('${t}', ${i})" class="hover:text-red-400">×</button></span>`).join(''); };

        window.renderIconSelection = (s) => { const c = document.getElementById('iconSelectionContainer'); c.innerHTML = ["Rocket", "Radio", "AlertCircle", "ShieldAlert", "Skull", "Crosshair"].map(i => `<button onclick="window.selectIcon('${i}')" class="p-2 border rounded transition-all ${s===i?'border-blue-500 bg-blue-900/30 text-blue-400':'border-gray-700 hover:border-gray-500'}">${icons[i]}</button>`).join(''); };
        window.selectIcon = (i) => { document.getElementById('editIcon').value = i; window.renderIconSelection(i); };

        window.openFactionModal = () => { const l = document.getElementById('factionList'); l.innerHTML = ""; Object.entries(factions).forEach(([n, f]) => l.insertAdjacentHTML('beforeend', window.createFactionRow(n, f))); document.getElementById('factionModal').classList.remove('opacity-0', 'pointer-events-none'); };
        window.createFactionRow = (n='', f='') => `<div class="faction-row grid grid-cols-12 gap-2 mb-2"><input type="text" class="faction-name col-span-5 bg-gray-950 border border-gray-700 rounded p-1 text-xs text-gray-200" value="${n}"><input type="text" class="faction-value col-span-6 bg-gray-950 border border-gray-700 rounded p-1 text-xs text-gray-200" value="${f}"><button onclick="this.parentElement.remove()" class="text-red-500 text-xs font-bold hover:text-red-400 transition-colors">X</button></div>`;
        window.addFactionRow = () => document.getElementById('factionList').insertAdjacentHTML('beforeend', window.createFactionRow());
        window.saveFactions = () => { factions = {}; document.querySelectorAll('.faction-row').forEach(r => { const n = r.querySelector('.faction-name').value; if(n) factions[n] = r.querySelector('.faction-value').value; }); window.closeModal('factionModal'); renderApp(); };

        window.saveHeader = () => { appTitle = document.getElementById('editAppTitle').value; appSubtitle = document.getElementById('editAppSubtitle').value; appFontHeading = document.getElementById('editAppFontHeading').value; appFontBody = document.getElementById('editAppFontBody').value; applyFonts(appFontHeading, appFontBody); window.closeModal('headerModal'); renderApp(); };
        window.openHeaderModal = () => { document.getElementById('editAppTitle').value = appTitle; document.getElementById('editAppSubtitle').value = appSubtitle; document.getElementById('headerModal').classList.remove('opacity-0', 'pointer-events-none'); };

        window.resetApp = () => { window.customConfirm("Möchtest du alle Daten löschen?", () => location.reload()); };
        window.confirmDeleteEvent = () => { const id = parseInt(document.getElementById('editId').value); window.customConfirm("Ereignis löschen?", () => { events = events.filter(e => e.id !== id); window.closeModal('editModal'); renderApp(); }); };

        function copyToClipboard(text) { const dummy = document.createElement("input"); document.body.appendChild(dummy); dummy.value = text; dummy.select(); document.execCommand("copy"); document.body.removeChild(dummy); }
        function showCopySuccess(t) { const m = document.getElementById('copySuccessMsg'); m.textContent = t; m.classList.remove('opacity-0'); setTimeout(() => m.classList.add('opacity-0'), 2000); }

        window.customAlert = function(msg) {
            document.getElementById('dialogMessage').textContent = msg;
            document.getElementById('dialogButtons').innerHTML = `<button onclick="window.closeDialog()" class="px-6 py-2 bg-blue-600 rounded text-white text-sm font-bold hover:bg-blue-500 transition-colors">OK</button>`;
            document.getElementById('dialogModal').classList.remove('opacity-0', 'pointer-events-none');
        };
        window.customConfirm = function(msg, onConfirm) {
            document.getElementById('dialogMessage').textContent = msg;
            window._currentConfirmCallback = onConfirm;
            document.getElementById('dialogButtons').innerHTML = `<button onclick="window.closeDialog()" class="px-4 py-2 bg-gray-800 border border-gray-600 rounded text-gray-300 text-sm hover:bg-gray-700 transition-colors">Abbrechen</button><button onclick="window.executeConfirm()" class="px-4 py-2 bg-red-600 rounded text-white text-sm font-bold hover:bg-red-500 transition-colors">Bestätigen</button>`;
            document.getElementById('dialogModal').classList.remove('opacity-0', 'pointer-events-none');
        };
        window.closeDialog = () => { document.getElementById('dialogModal').classList.add('opacity-0', 'pointer-events-none'); window._currentConfirmCallback = null; };
        window.executeConfirm = () => { if(window._currentConfirmCallback) window._currentConfirmCallback(); window.closeDialog(); };

        document.getElementById('modalNotes').addEventListener('input', e => { if(currentOpenEventId) eventNotes[currentOpenEventId] = e.target.value; });
        window.addEventListener('load', () => { const s = new URLSearchParams(window.location.search).get('scenario'); if(s) try { applyImportedData(JSON.parse(decodeScenario(s))); window.history.replaceState({}, "", window.location.pathname); } catch(e){} });

        applyFonts(appFontHeading, appFontBody);
        renderApp();
    </script>
</body>
</html>
